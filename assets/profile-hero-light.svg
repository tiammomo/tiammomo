<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Tiammomo — AI-native product builder</title>
  <desc id="desc">AI systems, developer infrastructure, and production software</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4f7ff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#64748b" stroke-opacity=".09"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#64748b" flood-opacity=".2"/>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="24" fill="url(#grid)"/>
  <circle cx="1000" cy="90" r="260" fill="url(#glow)"/>
  <path d="M0 288C206 245 346 324 552 285s322-121 648-63v118H0Z" fill="#4f46e5" opacity=".035"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(70 56)">
      <rect width="6" height="28" rx="3" fill="url(#accent)"/>
      <text x="20" y="20" fill="#0f766e" font-size="14" font-weight="700" letter-spacing="2.4">TIAMMOMO / BUILD LOG</text>

      <text y="94" fill="#172033" font-size="50" font-weight="760" letter-spacing="-1.8">From model output</text>
      <text y="151" fill="url(#accent)" font-size="50" font-weight="760" letter-spacing="-1.8">to dependable products.</text>

      <text y="202" fill="#526176" font-size="18">Agent systems · developer infrastructure · full-stack products</text>
      <text y="246" fill="#78869a" font-size="14" letter-spacing=".4">EVIDENCE  /  ARTIFACTS  /  RUNTIMES  /  OUTCOMES</text>
    </g>

    <g transform="translate(830 64)" filter="url(#shadow)">
      <rect width="300" height="210" rx="20" fill="#ffffff" stroke="#d6deeb"/>
      <circle cx="28" cy="26" r="5" fill="#fb7185"/>
      <circle cx="46" cy="26" r="5" fill="#fbbf24"/>
      <circle cx="64" cy="26" r="5" fill="#34d399"/>
      <text x="86" y="31" fill="#8491a3" font-size="11" letter-spacing="1.5">SYSTEM MAP</text>

      <path d="M86 90h34M180 90h34M150 110v22" stroke="#0f766e" stroke-opacity=".75" stroke-width="2"/>
      <path d="m113 85 7 5-7 5M207 85l7 5-7 5M145 125l5 7 5-7" fill="none" stroke="#0f766e" stroke-width="2"/>

      <g font-size="12" font-weight="650" text-anchor="middle">
        <rect x="22" y="65" width="64" height="50" rx="12" fill="#effcf9" stroke="#99d9cc"/>
        <text x="54" y="94" fill="#0f766e">Evidence</text>

        <rect x="120" y="65" width="60" height="50" rx="12" fill="#f0f1ff" stroke="#b9baf0"/>
        <text x="150" y="94" fill="#4338ca">Runtime</text>

        <rect x="214" y="65" width="64" height="50" rx="12" fill="#effcf9" stroke="#99d9cc"/>
        <text x="246" y="94" fill="#0f766e">Artifact</text>

        <rect x="113" y="132" width="74" height="48" rx="12" fill="#f4f1ff" stroke="#c4b5fd"/>
        <text x="150" y="161" fill="#5b21b6">Outcome</text>
      </g>
    </g>
  </g>

  <rect x=".5" y=".5" width="1199" height="339" rx="23.5" fill="none" stroke="#cbd5e1"/>
</svg>
